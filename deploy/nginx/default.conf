server {
    listen 80;
    server_name mundacasolutions.com www.mundacasolutions.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name mundacasolutions.com www.mundacasolutions.com;

    ssl_certificate /etc/letsencrypt/live/mundacasolutions.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mundacasolutions.com/privkey.pem;

    client_max_body_size 20M;

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
